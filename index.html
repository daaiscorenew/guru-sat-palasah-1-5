  if(_dbCache[k]) return _dbCache[k];
  if(!FIREBASE_CONFIGS[k]){ return null; }
  try{
    var app=firebase.initializeApp(FIREBASE_CONFIGS[k],"db_"+k.replace(/\s/g,"_"));

function sByT(docs,desc){
  if(desc===undefined)desc=true;
  return docs.sort(function(a,b){
    var ta=a.createdAt?(a.createdAt.seconds||0):0;
    var tb=b.createdAt?(b.createdAt.seconds||0):0;
    return desc?(tb-ta):(ta-tb);

}

function showToast(m,t){
  t=t||'success';
  var c=document.getElementById('toastContainer'), e=document.createElement('div');
  e.className='toast toast-'+t;
  e.innerHTML='<i class="fas fa-'+(t==='success'?'check-circle':t==='warning'?'exclamation-triangle':'times-circle')+' flex-shrink-0 mt-0.5"></i><span>'+m+'</span>';
  c.appendChild(e);
  setTimeout(function(){if(e.parentNode)e.remove()},5000);
}

function getGuruKelas(){if(!gData)return[];if(gData.jenis==='guru kelas')return[gData.kelas];return["Kelas 1","Kelas 2","Kelas 3","Kelas 4","Kelas 5"];}

  h+='</select></div><div><label class="text-xs text-muted block mb-1">Kelas</label><select id="'+id+'K" class="input-field" onchange="switchDB(this.value); reload'+id+'()"><option value="">Semua</option>';

/* === FETCHING DATA === */
function fetchSoal(mapel,kelas){
  var targetKelas=kelas||activeClass; 
  var db=getDB(targetKelas);
  if(!db) return Promise.resolve([]);
  var q=db.collection('questions');
  if(mapel) q=q.where('mapel','==',mapel);
  return q.get().then(function(s){
    var d=[]; s.forEach(function(doc){d.push(doc.data())});
    return sByT(d,false);
  }).catch(function(err){
    showToast("Gagal memuat soal: "+err.message, 'error');
    return [];
  });
}
function fetchSiswaRombel(kelas,rombel){
  var targetKelas=kelas||activeClass; var db=getDB(targetKelas);
  if(!db) return Promise.resolve([]);
  var npsnGuru=getGuruNPSN();
  var q = db.collection('siswa').where('npsn','==',npsnGuru);
  return q.get().then(function(s){
    var d=[];
    s.forEach(function(doc){var t=doc.data(); t._id=doc.id; d.push(t)});
    if(rombel) d = d.filter(function(x){return x.rombel === rombel});
    return d.sort(function(a,b){return(a.nama||'').localeCompare(b.nama||'')});
  }).catch(function(err){
    showToast("Gagal memuat siswa: Cek koneksi internet", 'error');
    return [];
  });
}
function fetchTokensGuru(kelas){
  var targetKelas=kelas||activeClass; var db=getDB(targetKelas);
  if(!db) return Promise.resolve([]);
  var nip=gData?gData.nip:'', npsnGuru=getGuruNPSN();
  return db.collection('tokens').where('guruNip','==',nip).get().then(function(s){
    var d=[]; s.forEach(function(doc){var t=doc.data(); t._id=doc.id; d.push(t)});
    return d.filter(function(x){return!x.npsn||x.npsn===npsnGuru}).sort(function(a,b){return((b.createdAt||{}).seconds||0)-((a.createdAt||{}).seconds||0)});
  }).catch(function(err){ return []; });
}
function fetchNilai(mapel,kelas,rombel){
  var targetKelas=kelas||activeClass; var db=getDB(targetKelas);
  if(!db) return Promise.resolve([]);
  var npsnGuru=getGuruNPSN(), q=db.collection('nilai').where('mapel','==',mapel);
  return q.get().then(function(s){
    var d=[]; s.forEach(function(doc){var t=doc.data(); t._id=doc.id; d.push(t)});
    return d.filter(function(x){return(!rombel||x.rombel===rombel)&&(!x.npsn||x.npsn===npsnGuru)}).sort(function(a,b){return(a.nama||'').localeCompare(b.nama||'')});
  }).catch(function(err){ return []; });
}
function cekNISN(nisn,kelas,rombel){
  var targetKelas=kelas||activeClass; var db=getDB(targetKelas);
  if(!db) return Promise.resolve(null);
  return db.collection('siswa').where('nisn','==',nisn).limit(1).get().then(function(s){return s}).catch(function(e){return null});
}

/* === AUTHENTICATION === */
function doGuruReg(){
  var npsn=document.getElementById('rNPSN').value.trim(), sekolah=document.getElementById('rSekolah').value.trim(), nip=document.getElementById('rNIP').value.trim(), nama=document.getElementById('rNama').value.trim(), jenis=document.getElementById('rJenis').value, kelas=document.getElementById('rKelas').value;
  var rombel=[]; document.querySelectorAll('.rRombelCb:checked').forEach(function(cb){rombel.push(cb.value)});
  if(!npsn||!sekolah||!nip||!nama||!jenis||!rombel.length){showToast('Semua field wajib diisi (pilih min 1 rombel)','error');return}
  if(jenis==='guru kelas'&&!kelas){showToast('Pilih kelas','error');return}
  if(nip.length<5){showToast('NIP tidak valid','error');return}
  showToast('Memeriksa NIP...','warning');
  Promise.all(KELAS_LIST.map(function(k){
    var db=getDB(k); if(!db) return Promise.resolve(null);
    return db.collection('guru').where('nip','==',nip).limit(1).get().then(function(s){
      return s.empty?null:{kelas:k};
    }).catch(function(){return null});
  })).then(function(results){
    for(var i=0;i<results.length;i++){if(results[i]){showToast('NIP sudah terdaftar di database '+results[i].kelas+'!','error');return}}
    var targetDBs=jenis==='guru kelas'?[kelas]:["Kelas 1","Kelas 2","Kelas 3","Kelas 4","Kelas 5"];
    var promises=targetDBs.map(function(targetKelas){
      var db=getDB(targetKelas); if(!db) return Promise.resolve();
      return db.collection('guru').add({
        npsn:npsn,sekolah:sekolah,nip:nip,nama:nama,jenis:jenis,kelas:kelas,rombel:rombel,
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    });
    Promise.all(promises).then(function(){
      showToast('Registrasi berhasil! Terdaftar di '+targetDBs.length+' database kelas.');
      showAuthTab('login');
      document.getElementById('lNIP').value=nip;
    }).catch(function(e){showToast('Gagal: '+e.message,'error')});
  });
}

function doGuruLogin(){
  var nip=document.getElementById('lNIP').value.trim();
  if(!nip){showToast('Masukkan NIP','error');return}

  // Cek Super Admin
  if(nip === SUPER_ADMIN_CREDENTIALS.nip){
    isSuperAdmin = true;
    // Setup dummy data
    gData = { nama: "SUPER ADMIN", nip: "SUPERADMIN", jenis: "Super Admin", sekolah: "KAB. MAJALENGKA", npsn: "GLOBAL", kelas: "ALL", rombel: ["A","B","C"] };
    
    document.getElementById('authPage').style.display='none';
    document.getElementById('mainPage').classList.remove('hidden');
    document.getElementById('guruInfo').textContent='Super Admin';
    document.getElementById('headerGuru').textContent='Super Admin';
    document.getElementById('headerKelas').textContent='GLOBAL ACCESS';
    
    document.getElementById('adminControlPanel').classList.remove('hidden');
    
    initAdminPanel(); // Render toggle per fitur
    
    navTo('dashboard');
    showToast('Selamat datang, Super Admin', 'warning');
    return;
  }

  isSuperAdmin = false;
  document.getElementById('adminControlPanel').classList.add('hidden');
  
  showToast('Memeriksa database sekolah...','warning');
  Promise.all(KELAS_LIST.map(function(k){
    var db=getDB(k); if(!db) return Promise.resolve(null);
    return db.collection('guru').where('nip','==',nip).limit(1).get().then(function(s){
      if(s.empty) return null;
      var d=s.docs[0].data(); d._id=s.docs[0].id; d._db=k; return d;
    }).catch(function(e){ return null; });
  })).then(function(results){
    var found=null;
    for(var i=0;i<results.length;i++){if(results[i]){found=results[i];break}}
    if(!found){ showToast('NIP tidak ditemukan. Daftar dulu.','error'); return; }
    
    gData=found;
    activeClass=found.jenis==='guru kelas'?found.kelas:'Kelas 1';
    document.getElementById('authPage').style.display='none';
    document.getElementById('mainPage').classList.remove('hidden');
    document.getElementById('guruInfo').textContent=found.nama.substring(0,20);
    document.getElementById('headerGuru').textContent=found.nama;
    var rombelText=Array.isArray(found.rombel)?found.rombel.join(', '):found.rombel;
    document.getElementById('headerKelas').textContent=found.jenis==='guru kelas'?found.kelas+' Rombel '+rombelText:found.jenis.toUpperCase()+' Rombel '+rombelText;
    
    navTo('dashboard');
    showToast('Selamat datang, '+found.nama);
  }).catch(function(e){
    showToast('Koneksi gagal, coba lagi','error');
  });
}

/* === ADMIN CONTROLS (SATU SATU) === */
function initAdminPanel() {
  var list = document.getElementById('adminLockList');
  if(!list) return;
  list.innerHTML = '';

  PROTECTED_FEATURES.forEach(function(feat){
    var isLocked = featureLockState[feat.id];
    var toggleClass = isLocked ? '' : 'unlocked'; // Unlocked = Green
    var statusText = isLocked ? 'LOCKED' : 'OPEN';
    var statusColor = isLocked ? 'text-danger' : 'text-success';
    
    var h = '<div class="admin-toggle-row">';
    h += '<span class="admin-toggle-label flex-1">' + feat.name + '</span>';
    h += '<div class="admin-switch ' + toggleClass + '" onclick="toggleFeatureLock(\'' + feat.id + '\')">';
    h += '<div class="admin-switch-thumb"></div>';
    h += '</div>';
    h += '</div>';
    list.innerHTML += h;
  });
  
  updateNavVisuals();
}

function toggleFeatureLock(id) {
  featureLockState[id] = !featureLockState[id];
  initAdminPanel(); // Refresh UI Toggles
  var feat = PROTECTED_FEATURES.find(f => f.id === id);
  if(featureLockState[id]){
    showToast(feat.name + " Dikunci", "warning");
  } else {
    showToast(feat.name + " Dibuka", "success");
  }
}

function adminLockAll() {
  PROTECTED_FEATURES.forEach(f => featureLockState[f.id] = true);
  initAdminPanel();
  showToast("Semua Fitur Dikunci", "warning");
}

function adminUnlockAll() {
  PROTECTED_FEATURES.forEach(f => featureLockState[f.id] = false);
  initAdminPanel();
  showToast("Semua Fitur Dibuka", "success");
}

function updateNavVisuals() {
  PROTECTED_FEATURES.forEach(function(feat){
    var el = document.querySelector('.nav-item[data-page="'+feat.id+'"]');
    if(el){
      if(featureLockState[feat.id]) el.classList.add('locked-item');
      else el.classList.remove('locked-item');
    }
  });
}

function doLogout(){
  gData=null;
  activeClass='Kelas 1';
  isSuperAdmin = false;
  document.getElementById('mainPage').classList.add('hidden');
  document.getElementById('authPage').style.display='';
  document.getElementById('lNIP').value='';
  document.getElementById('adminControlPanel').classList.add('hidden');
  showToast('Berhasil keluar');
}

/* === NAVIGATION === */
function navTo(page){
  // Cek Izin Akses (PER FITUR)
  if(page !== 'dashboard' && isSuperAdmin){
    if(featureLockState[page] === true){
      showToast("Fitur ini Dikunci!", "error");
      return;
    }
  }

  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active')});
  var t=document.querySelector('.nav-item[data-page="'+page+'"]');
  if(t)t.classList.add('active');
  
  var titles={
    dashboard:'Beranda','kelola-tp':'Kelola TP','bank-soal':'Bank Soal','print-soal':'Cetak Soal',
    'print-kisi':'Kisi-Kisi','print-kunci':'Kunci Jawaban',pensekoran:'Pensekoran',
    koreksi:'Koreksi Nilai','cetak-nilai':'Cetak Nilai','data-siswa':'Data Siswa',
    token:'Token Ujian','kartu-ujian':'Kartu Ujian 2026','lembar-jawaban':'Lembar Jawaban'
  };
  document.getElementById('pageTitle').textContent=titles[page]||'Beranda';
  var c=document.getElementById('pageContent');
  
  if(page==='dashboard')rDash(c);
  else if(page==='kelola-tp')rTP(c);
  else if(page==='bank-soal')rBank(c);
  else if(page==='print-soal')rPrintSoal(c);
  else if(page==='print-kisi')rKisi(c);
  else if(page==='print-kunci')rKunci(c);
  else if(page==='pensekoran')rSkor(c);
  else if(page==='koreksi')rKoreksi(c);
  else if(page==='cetak-nilai')rCetakNilai(c);
  else if(page==='data-siswa')rSiswa(c);
  else if(page==='token')rToken(c);
  else if(page==='kartu-ujian')rKartuUjian(c);
  else if(page==='lembar-jawaban')rLembarJawaban(c);
}

  if(isSuperAdmin){
    h+='<div class="p-4 bg-dark/40 border border-kopAccent/40 rounded-lg mb-4"><h4 class="font-bold text-kopAccent text-sm mb-2">Kontrol Akses Fitur</h4><p class="text-xs text-muted mb-2">Klik toggle di atas sidebar untuk mengunci/membuka fitur tertentu.</p></div>';
  }

  h+='<div class="grid grid-cols-2 md:grid-cols-4 gap-3"><div class="stat-box bg-dark/40 border border-border p-3 rounded"><div class="text-xs text-muted">NIP</div><div class="text-sm font-bold text-light mt-1">'+gData.nip+'</div></div><div class="stat-box bg-dark/40 border border-border p-3 rounded"><div class="text-xs text-muted">Kelas</div><div class="text-sm font-bold text-kopAccent mt-1">'+(gData.kelas||'1-5')+'</div></div><div class="stat-box bg-dark/40 border border-border p-3 rounded"><div class="text-xs text-muted">Rombel</div><div class="text-sm font-bold text-info mt-1">'+gData.rombel.join(', ')+'</div></div><div class="stat-box bg-dark/40 border border-border p-3 rounded"><div class="text-xs text-muted">Jenis</div><div class="text-sm font-bold text-warning mt-1">'+gData.jenis+'</div></div></div></div>';
  h+='<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4">';

      pg.forEach(function(q,i){hh+='<tr><td style="text-align:center">'+(i+1)+'</td><td style="text-align:center">'+(q.level||'mudah')+'</td><td style="text-align:center;font-weight:bold;font-size:14pt">'+(q.answer||'-')+'</td></tr>'});
      hh+='</tbody></table>';
    }
    if(ur.length){
      hh+='<div style="margin-top:16px;font-weight:bold;border-bottom:2px solid #000;padding-bottom:5px;margin-bottom:10px">Jawaban Uraian</div>';
      ur.forEach(function(q,i){hh+='<div style="margin-bottom:6px"><strong>'+(pg.length+i+1)+'.</strong> '+(q.answer||'(lihat pedoman)')+'</div>'});
    }
    hh+='</div>';pp.innerHTML=hh;
  });
}

function reloadskr(){document.getElementById('skorBox').innerHTML=''}

      pg.forEach(function(q,i){
        var lv=q.level||'mudah', lc=LEVEL_COLORS[lv]||LEVEL_COLORS.mudah, opts=getOpts(q.kelas||f.kelas);
        h+='<tr class="border-t border-border"><td class="p-2 font-bold">'+(i+1)+'</td><td class="p-2"><span class="text-xs px-1 py-0.5 rounded '+lc.bg+' '+lc.text+' font-bold">'+lc.label+'</span></td><td class="p-2 font-bold text-kopAccent">'+(q.answer||'-')+'</td><td class="p-2"><select id="jawabPG'+i+'" class="input-field text-xs py-1" onchange="hSPG('+i+','+bPG+')"><option value="">--</option>';
        opts.forEach(function(l){h+='<option value="'+l+'">'+l+'</option>'});

      h+='</tbody></table></div><div class="flex justify-between items-center mt-2 p-3 bg-info/10 rounded-lg border border-info/30"><span class="text-sm font-bold text-info">Total PG</span><span id="totalPG" class="font-bold text-info text-lg">0</span></div></div>';
    }
    if(ur.length){
      h+='<div class="mb-6"><h5 class="font-bold text-warning text-sm mb-3">II. Uraian (Maks '+bUr+' poin/soal)</h5><div class="bg-dark/40 rounded-lg overflow-x-auto"><table class="w-full text-sm"><thead><tr class="bg-dark/60"><th class="p-2 w-8">No</th><th class="p-2 w-16">Level</th><th class="p-2">Soal</th><th class="p-2 text-center w-20">Skor</th></tr></thead><tbody>';
      ur.forEach(function(q,i){
        var lv=q.level||'mudah', lc=LEVEL_COLORS[lv]||LEVEL_COLORS.mudah;
        h+='<tr class="border-t border-border"><td class="p-2 font-bold">'+(pg.length+i+1)+'</td><td class="p-2"><span class="text-xs px-1 py-0.5 rounded '+lc.bg+' '+lc.text+' font-bold">'+lc.label+'</span></td><td class="p-2 text-xs text-muted">'+(q.text||'').substring(0,80)+'...</td><td class="p-2 text-center"><input type="number" id="skorUr'+i+'" class="score-input" min="0" max="'+bUr+'" value="0" onchange="hSUR('+i+','+bUr+')"></td></tr>';
      });
      h+='</tbody></table></div><div class="flex justify-between items-center mt-2 p-3 bg-warning/10 rounded-lg border border-warning/30"><span class="text-sm font-bold text-warning">Total Uraian</span><span id="totalUr" class="font-bold text-warning text-lg">0</span></div></div>';
    }
    h+='<div class="p-4 bg-kopAccent/10 rounded-lg border-2 border-kopAccent/40 text-center"><div class="text-xs text-muted mb-1">TOTAL NILAI AKHIR</div><div id="totalAkhir" class="text-4xl font-black text-kopAccent">0</div></div><div class="text-center mt-4"><button onclick="resetSkor()" class="btn-secondary text-sm"><i class="fas fa-redo mr-1"></i>Reset</button></div></div>';
    box.innerHTML=h;
  });
}
function hSPG(i,bobot){var jawab=document.getElementById('jawabPG'+i).value;var skor=(jawab===pg_kunci_m[i])?bobot:0;document.getElementById('skorPG'+i).textContent=skor;document.getElementById('skorPG'+i).className='font-bold '+(skor>0?'text-success':'text-muted');uTPG()}
function uTPG(){var total=0;for(var i=0;i<100;i++){var el=document.getElementById('skorPG'+i);if(el)total+=parseInt(el.textContent)||0}var tEl=document.getElementById('totalPG');if(tEl)tEl.textContent=total;uAkhir()}
function hSUR(i,bobot){var v=parseInt(document.getElementById('skorUr'+i).value)||0;if(v>bobot)v=bobot;if(v<0)v=0;document.getElementById('skorUr'+i).value=v;var total=0;for(var j=0;j<100;j++){var el=document.getElementById('skorUr'+j);if(el)total+=parseInt(el.value)||0}var tEl=document.getElementById('totalUr');if(tEl)tEl.textContent=total;uAkhir()}
function uAkhir(){var pg=0, ur=0;var pEl=document.getElementById('totalPG');var uEl=document.getElementById('totalUr');if(pEl)pg=parseInt(pEl.textContent)||0;if(uEl)ur=parseInt(uEl.textContent)||0;var t=Math.min(pg+ur,100);var aEl=document.getElementById('totalAkhir');if(aEl)aEl.textContent=t}
function resetSkor(){for(var i=0;i<100;i++){var el=document.getElementById('jawabPG'+i);if(el)el.value='';var sEl=document.getElementById('skorPG'+i);if(sEl){sEl.textContent='0';sEl.className='font-bold text-muted'}var uEl=document.getElementById('skorUr'+i);if(uEl)uEl.value='0'}var tEl=document.getElementById('totalUr');if(tEl)tEl.textContent='0';uTPG();uAkhir();showToast('Skor direset')}

function loadKoreksiData() {
  var mapelEl = document.getElementById('koreksi_mapel');
  var kelasEl = document.getElementById('koreksi_kelas');
  var infoEl = document.getElementById('koreksi_info');
  var containerEl = document.getElementById('koreksi_container');
  var btnEl = document.getElementById('koreksi_btnShow');
  var modeContainer = document.getElementById('koreksi_mode_container');

  modeContainer.classList.add('hidden'); modeContainer.innerHTML = '';
  containerEl.style.display = '';

  if (!mapelEl || !kelasEl || !containerEl) return;

  var mapel = mapelEl.value;
  var kelas = kelasEl.value || activeClass;

  if (!mapel) {
    showToast('Pilih Mapel terlebih dahulu', 'warning');
    infoEl.classList.add('hidden'); containerEl.innerHTML = '';
    return;
  }

  if(btnEl){ btnEl.disabled = true; btnEl.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Memuat...'; }
  infoEl.classList.add('hidden');
  containerEl.innerHTML = '<div class="text-center py-8 text-muted"><i class="fas fa-circle-notch fa-spin mr-2"></i>Mengambil data nilai...</div>';

  fetchNilai(mapel, kelas).then(function(nilaiDocs) {
    if(btnEl){ btnEl.disabled = false; btnEl.innerHTML = '<i class="fas fa-search mr-2"></i>Tampilkan'; }
    if (!Array.isArray(nilaiDocs)) nilaiDocs = [];

    if (!nilaiDocs.length) {
      containerEl.innerHTML = '<div class="card text-center py-8 border-dashed border-2 border-border bg-dark/20"><i class="fas fa-inbox text-4xl text-muted mb-3"></i><p class="text-muted">Belum ada data nilai.</p></div>';
      return;
    }

    var mn = (MAPEL_LIST.find(function(m) { return m.id === mapel; }) || {}).nama || mapel;
    
    var h = '<div class="card"><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="bg-dark/60"><th class="p-2 text-left w-8">No</th><th class="p-2 text-left">Nama Siswa</th><th class="p-2 text-center">PG</th><th class="p-2 text-center">Uraian</th><th class="p-2 text-center">Total (/2)</th><th class="p-2 text-center">Predikat</th><th class="p-2 text-center w-44">Aksi</th></tr></thead><tbody>';

    nilaiDocs.forEach(function(d, i) {
      var nPg = d.nilaiPG || 0;
      var nUr = d.nilaiUr || 0;
      var t = d.nilaiTotal || 0; 
      var pred = t >= 90 ? 'A' : t >= 80 ? 'B' : t >= 70 ? 'C' : t >= 60 ? 'D' : 'E';
      var predC = t >= 90 ? 'text-success' : t >= 70 ? 'text-info' : t >= 60 ? 'text-warning' : 'text-danger';
      var dataRombel = d.rombel || kelas; 

      h += '<tr class="border-t border-border hover:bg-dark/30">';
      h += '<td class="p-2 font-bold">' + (i + 1) + '</td>';
      h += '<td class="p-2 font-semibold">' + d.nama + ' <span class="text-xs text-muted">(' + d.nisn + ')</span></td>';
      h += '<td class="p-2 text-center font-bold text-info">' + nPg + '</td>';
      h += '<td class="p-2 text-center font-bold text-warning">' + nUr + '</td>';
      h += '<td class="p-2 text-center font-bold text-kopAccent text-lg">' + t + '</td>';
      h += '<td class="p-2 text-center font-bold ' + predC + '">' + pred + '</td>';
      h += '<td class="p-2 text-center">';
      h += '<div class="flex items-center justify-center gap-2">';
      h += '<button onclick="mulaiKoreksiDetail(\'' + d.nisn + '\',\'' + mapel + '\',\'' + kelas + '\',\'' + dataRombel + '\')" class="px-3 py-1 bg-kopAccent text-kop font-bold rounded text-xs hover:brightness-110 shadow"><i class="fas fa-eye mr-1"></i>Lihat & Koreksi</button>';
      h += '<button onclick="tampilkanModalHapus(\'' + d.nisn + '\',\'' + d.nama + '\',\'' + mapel + '\',\'' + kelas + '\',\'' + dataRombel + '\')" class="px-3 py-1 bg-danger/20 text-danger font-bold rounded text-xs hover:bg-danger/30 border border-danger/30"><i class="fas fa-trash-alt mr-1"></i>Hapus</button>';
      h += '</div></td></tr>';
    });

    h += '</tbody></table></div></div>';
    containerEl.innerHTML = h;
    infoEl.classList.remove('hidden');
    infoEl.innerHTML = 'Daftar Nilai: ' + mn + ' &mdash; ' + kelas + ' <span class="mx-2 text-border">|</span> <span class="text-muted"><i class="fas fa-calculator mr-1"></i>Formula: (PG + Uraian) / 2</span>';
  }).catch(function(e) {
    if(btnEl){ btnEl.disabled = false; btnEl.innerHTML = '<i class="fas fa-search mr-2"></i>Tampilkan'; }
    containerEl.innerHTML = '<p class="text-danger p-4">Gagal memuat: ' + e.message + '</p>';
  });
}

function tampilkanModalHapus(nisn, nama, mapel, kelas, rombel) {
  var modal = document.getElementById('modal_hapus_koreksi');
  var namaEl = document.getElementById('hapus_nama_siswa');
  var btnKonfirmasi = document.getElementById('btn_konfirmasi_hapus');
  namaEl.textContent = nama + ' (' + nisn + ')';
  btnKonfirmasi.onclick = function() { eksekusiHapusKoreksi(nisn, nama, mapel, kelas, rombel); };
  modal.classList.remove('hidden'); modal.classList.add('flex');
}

function tutupModalHapus() {
  var modal = document.getElementById('modal_hapus_koreksi');
  modal.classList.add('hidden'); modal.classList.remove('flex');
}

function eksekusiHapusKoreksi(nisn, nama, mapel, kelas, rombel) {
  var db = getDB(kelas);
  if(!db){ showToast('DB Error','error'); return; }
  var docId = kelas + '_' + rombel + '_' + mapel + '_' + nisn;
  var btn = document.getElementById('btn_konfirmasi_hapus');
  var ori = btn.innerHTML;
  btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Menghapus...';
  db.collection('nilai').doc(docId).delete().then(function() {
    showToast('Data nilai ' + nama + ' berhasil dihapus', 'success');
    tutupModalHapus();
    if(!document.getElementById('koreksi_mode_container').classList.contains('hidden')){ kembaliKeDaftar(); }
    loadKoreksiData();
  }).catch(function(e) {
    showToast('Gagal menghapus: ' + e.message, 'error');
    btn.disabled = false; btn.innerHTML = ori;
  });
}

function mulaiKoreksiDetail(nisn, mapel, kelas, rombel) {
  var container = document.getElementById('koreksi_mode_container');
  var listContainer = document.getElementById('koreksi_container');
  listContainer.style.display = 'none';
  container.classList.remove('hidden');
  container.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-2xl text-kopAccent"></i><p class="mt-2 text-muted">Memuat soal dan menghitung skor otomatis...</p></div>';

  var db = getDB(kelas);
  if(!db){ showToast('DB Error','error'); return; }
  var docId = kelas + '_' + rombel + '_' + mapel + '_' + nisn;

  Promise.all([
    db.collection('nilai').doc(docId).get(),
    fetchSoal(mapel, kelas)
  ]).then(function(results) {
    var nilaiDoc = results[0];
    var soalDocs = results[1];

    if (!nilaiDoc.exists) {
      showToast('Data nilai tidak ditemukan','error');
      kembaliKeDaftar();
      return;
    }
    var nilai = nilaiDoc.data();
    if(!Array.isArray(soalDocs)) soalDocs = [];

    var filteredSoal = soalDocs.filter(function(q){ return q.kelas === kelas; });
    var pg = [], ur = [];
    filteredSoal.forEach(function(q){ if(q.type==='pg') pg.push(q); else ur.push(q); });

    var bobotPG = pg.length ? Math.round(100/pg.length) : 0;
    var bobotUr = ur.length ? Math.round(100/ur.length) : 0;
    var mn = (MAPEL_LIST.find(function(m){return m.id===mapel})||{}).nama||mapel;

    var autoSkorPG = 0; var pgBenar = 0; var pgSalah = 0;
    pg.forEach(function(q, i){
      var jawabSiswa = (nilai.jawabanPG && nilai.jawabanPG[i]) ? nilai.jawabanPG[i] : '';
      var kunci = q.answer || '';
      if(jawabSiswa.toUpperCase() === kunci.toUpperCase()) { autoSkorPG += bobotPG; pgBenar++; } else { pgSalah++; }
    });

    var autoSkorUr = 0;
    ur.forEach(function(q, i){ autoSkorUr += (nilai.skorPerSoalUr && nilai.skorPerSoalUr[i]) ? nilai.skorPerSoalUr[i] : 0; });

    var h = '<div class="card">';
    h += '<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 pb-4 border-b border-border gap-4">';
      h += '<div>';
        h += '<h3 class="text-xl font-bold text-kopAccent"><i class="fas fa-check-double mr-2"></i>Lembar Koreksi Detail</h3>';
        h += '<div class="text-sm text-muted mt-1">Siswa: <b class="text-light">' + nilai.nama + '</b> (' + nilai.nisn + ') <span class="mx-2">|</span> ' + mn + ' <span class="mx-2">|</span> ' + kelas + ' ' + rombel + '</div>';
      h += '</div>';
      h += '<div class="flex flex-wrap items-center gap-2">';
        h += '<button onclick="simpanKoreksiDetail(\''+nisn+'\',\''+mapel+'\',\''+kelas+'\',\''+rombel+'\')" class="btn-primary shadow-lg"><i class="fas fa-save mr-2"></i>SIMPAN PERUBAHAN</button>';
        h += '<button onclick="kembaliKeDaftar()" class="btn-secondary text-muted hover:text-light"><i class="fas fa-arrow-left mr-1"></i>Kembali</button>';
      h += '</div>';
    h += '</div>';

    h += '<div class="grid grid-cols-3 gap-4 mb-6">';
      h += '<div class="bg-info/10 border border-info/30 rounded-xl p-4 text-center">';
        h += '<div class="text-xs text-info font-bold mb-1"><i class="fas fa-list-ul mr-1"></i>SKOR PG (Otomatis)</div>';
        h += '<div id="livePg" class="text-4xl font-black text-info">' + autoSkorPG + '</div>';
        h += '<div class="text-[10px] text-info/60 mt-1">' + pgBenar + ' benar × ' + bobotPG + ' poin</div>';
      h += '</div>';
      h += '<div class="bg-warning/10 border border-warning/30 rounded-xl p-4 text-center">';
        h += '<div class="text-xs text-warning font-bold mb-1"><i class="fas fa-pen mr-1"></i>SKOR URAIAN</div>';
        h += '<div id="liveUr" class="text-4xl font-black text-warning">' + autoSkorUr + '</div>';
      h += '</div>';
      h += '<div class="bg-kopAccent/10 border-2 border-kopAccent/40 rounded-xl p-4 text-center">';
        h += '<div class="text-xs text-kopAccent font-bold mb-1"><i class="fas fa-star mr-1"></i>TOTAL AKHIR</div>';
        h += '<div id="liveTotal" class="text-4xl font-black text-kopAccent">' + Math.round((autoSkorPG + autoSkorUr) / 2) + '</div>';
        h += '<div class="text-[10px] text-kopAccent/60 mt-1">(' + autoSkorPG + ' + ' + autoSkorUr + ') / 2</div>';
      h += '</div>';
    h += '</div>';

    h += '<div class="bg-dark/60 border border-info/20 rounded-xl p-4 mb-6 grid grid-cols-3 gap-4 text-center">';
      h += '<div><div class="text-2xl font-black text-success">' + pgBenar + '</div><div class="text-xs text-success font-bold">BENAR</div></div>';
      h += '<div><div class="text-2xl font-black text-danger">' + pgSalah + '</div><div class="text-xs text-danger font-bold">SALAH</div></div>';
      h += '<div><div class="text-2xl font-black text-info">' + pg.length + '</div><div class="text-xs text-info font-bold">TOTAL SOAL PG</div></div>';
    h += '</div>';

    if(pg.length){
      h += '<div class="mb-8">';
      h += '<div class="flex justify-between items-center mb-3 border-b border-info/30 pb-2">';
        h += '<h4 class="font-bold text-info text-sm"><i class="fas fa-robot mr-2"></i>Hasil Pilihan Ganda (Dikoreksi Otomatis)</h4>';

function kembaliKeDaftar() {
  document.getElementById('koreksi_mode_container').classList.add('hidden');
  document.getElementById('koreksi_container').style.display = '';
}

function hitungLiveTotal() {
  var pgEl = document.getElementById('livePg');
  var skorPG = parseInt(pgEl ? pgEl.textContent : '0') || 0;

  var skorUr = 0;
  var elsUr = document.querySelectorAll('[id^="inputUr_"]');
  elsUr.forEach(function(el){ skorUr += parseInt(el.value)||0; });
  
  var finalTotal = Math.round((skorPG + skorUr) / 2);
  
  var tEl = document.getElementById('liveTotal');
  var urEl = document.getElementById('liveUr');
  
  if(urEl) urEl.textContent = skorUr;
  
  if(tEl) {
    tEl.textContent = finalTotal;
    tEl.style.transform = 'scale(1.1)';
    tEl.style.transition = 'transform 0.2s ease';
    setTimeout(function(){ tEl.style.transform = 'scale(1)'; }, 200);
  }
}

function simpanKoreksiDetail(nisn, mapel, kelas, rombel) {
  var db = getDB(kelas);
  if(!db){ showToast('DB Error','error'); return; }
  var docId = kelas + '_' + rombel + '_' + mapel + '_' + nisn;
  
  var btn = document.querySelector('#koreksi_mode_container .btn-primary');
  var ori = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Menghitung & Menyimpan...';

  Promise.all([
    db.collection('nilai').doc(docId).get(),
    fetchSoal(mapel, kelas)
  ]).then(function(results) {
    var nilaiDoc = results[0];
    var soalDocs = results[1];

    if (!nilaiDoc.exists) throw new Error('Data siswa hilang');
    var nilai = nilaiDoc.data();
    
    var filteredSoal = soalDocs.filter(function(q){ return q.kelas === kelas; });
    var pg = [], ur = [];
    filteredSoal.forEach(function(q){ if(q.type==='pg') pg.push(q); else ur.push(q); });

    var bobotPG = pg.length ? Math.round(100/pg.length) : 0;
    var skorPGTotal = 0;
    var jawabanPG = [];
    pg.forEach(function(q, i){
      var jawab = (nilai.jawabanPG && nilai.jawabanPG[i]) ? nilai.jawabanPG[i] : '';
      jawabanPG.push(jawab);
      if(jawab.toUpperCase() === (q.answer || '').toUpperCase()) {
        skorPGTotal += bobotPG;
      }
    });

    var skorPerSoalUr = [];
    var skorUrTotal = 0;
    var elsUrVal = document.querySelectorAll('[id^="inputUr_"]');
    for(var i=0; i<elsUrVal.length; i++){
       var s = parseInt(elsUrVal[i].value) || 0;
       skorPerSoalUr.push(s);
       skorUrTotal += s;
    }
    
    var finalTotal = Math.round((skorPGTotal + skorUrTotal) / 2);
    
    var updateData = {
      jawabanPG: jawabanPG,
      skorPerSoalUr: skorPerSoalUr,
      nilaiPG: skorPGTotal,      
      nilaiUr: skorUrTotal,
      nilaiTotal: finalTotal,
      submittedBy: 'guru_koreksi_fix',
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    
    return db.collection('nilai').doc(docId).update(updateData).then(function(){
      showToast('Tersimpan! PG: '+skorPGTotal+' + Ur: '+skorUrTotal+' = Total: '+finalTotal, 'success');
      btn.disabled = false;
      btn.innerHTML = ori;
      kembaliKeDaftar();
      loadKoreksiData(); 
    });
  }).catch(function(e){
    showToast('Gagal menyimpan: '+e.message, 'error');
    if(btn){ btn.disabled = false; btn.innerHTML = ori; }
  });
}

/* === TOKEN UJIAN === */
function rToken(c){
  var h='<div class="fade-in space-y-4"><div class="card"><div class="flex justify-between items-center mb-4"><h3 class="font-bold text-light">Token Ujian &mdash; <span class="text-kopAccent">'+activeClass+'</span></h3><button onclick="openGenToken()" class="btn-primary text-sm"><i class="fas fa-plus-circle mr-1"></i>Buat Token</button></div><div class="p-3 rounded-lg bg-info/10 border border-info/30 mb-4 text-xs text-info"><i class="fas fa-info-circle mr-1"></i>1 Token berlaku untuk semua Rombel di kelas yang dipilih. Siswa dibedakan otomatis oleh NISN saat login.</div><div id="tokenC"></div></div></div>';
  c.innerHTML=h;reloadToken();
}
function reloadToken(){
  var ct=document.getElementById('tokenC');
  ct.innerHTML='<p class="text-muted text-center py-4"><i class="fas fa-spinner fa-spin mr-2"></i>Memuat...</p>';
  fetchTokensGuru(activeClass).then(function(docs){
    if(!docs.length){ct.innerHTML='<div class="text-center py-8"><i class="fas fa-ticket-alt text-4xl text-muted mb-3"></i><p class="text-muted">Belum ada token.</p></div>';return}
    var h='<div class="token-row font-bold text-xs text-muted border-b-2 border-border grid grid-cols-[40px_1fr_1fr_100px_80px_80px] gap-2 items-center p-2">';h+='<span>No</span><span>Token</span><span>Mapel</span><span>Kelas</span><span>Durasi</span><span>Status</span><span>Aksi</span></div>';
    docs.forEach(function(d,i){
      var st=d.startTime?d.startTime.toDate():null, en=d.endTime?d.endTime.toDate():null, nowMs=Date.now();
      var isActive=st&&en&&nowMs>=st.getTime()&&nowMs<=en.getTime();
      var isExpired=en&&nowMs>en.getTime();
      var isUpcoming=st&&nowMs<st.getTime();
      var badge=isActive?'<span class="text-xs px-2 py-0.5 rounded bg-success/20 text-success font-bold">AKTIF</span>':isExpired?'<span class="text-xs px-2 py-0.5 rounded bg-danger/20 text-danger font-bold">EXPIRED</span>':isUpcoming?'<span class="text-xs px-2 py-0.5 rounded bg-warning/20 text-warning font-bold">MENUNGGU</span>':'<span class="text-xs px-2 py-0.5 rounded bg-muted/20 text-muted">-</span>';
      var mn=(MAPEL_LIST.find(function(m){return m.id===d.mapel})||{}).nama||d.mapel;
      h+='<div class="token-row grid grid-cols-[40px_1fr_1fr_100px_80px_80px] gap-2 items-center p-2 border-b border-border hover:bg-dark/30"><span class="font-bold">'+(i+1)+'</span><span class="font-mono font-bold text-kopAccent text-sm tracking-wider select-all">'+d.token+'</span><span class="text-xs text-muted">'+mn+'</span><span class="text-xs text-kopAccent font-bold">'+d.kelas+'</span><span class="text-xs">'+d.durationMinutes+' mnt</span><span>'+badge+'</span><span><button onclick="delToken(\''+d._id+'\',\''+d.kelas+'\')" class="text-danger hover:text-white text-xs"><i class="fas fa-trash"></i></button></span></div>';
    });
    ct.innerHTML=h;
  });
}
function openGenToken(){
  var h='<h3 class="font-bold text-light mb-4">Buat Token Ujian</h3><div class="space-y-3"><div><label class="text-xs text-muted block mb-1">Kelas Tujuan</label><select id="tkKelas" class="input-field">';getGuruKelas().forEach(function(k){h+='<option value="'+k+'"'+(k===activeClass?' selected':'')+'>'+k+'</option>'});h+='</select></div><div><label class="text-xs text-muted block mb-1">Mapel</label><select id="tkMapel" class="input-field">';MAPEL_LIST.forEach(function(m){h+='<option value="'+m.id+'">'+m.nama+'</option>'});h+='</select></div><div><label class="text-xs text-muted block mb-1">Durasi (menit)</label><input type="number" id="tkDur" class="input-field" value="60" min="5" max="300"></div><div class="p-3 rounded-lg bg-info/10 border border-info/30 text-xs text-info"><i class="fas fa-info-circle mr-1"></i>Token ini akan otomatis berlaku untuk <b>Rombel '+getGuruRombel().join(', ')+'</b> di kelas yang dipilih.</div></div><div class="mt-6 flex justify-end gap-3"><button onclick="closeModal()" class="btn-secondary">Batal</button><button onclick="genToken()" class="btn-primary"><i class="fas fa-key mr-2"></i>Generate Token</button></div>';
  openModal(h);
}
function genToken(){
  var kelasDipilih=document.getElementById('tkKelas').value, mapel=document.getElementById('tkMapel').value, dur=parseInt(document.getElementById('tkDur').value)||60;
  if(!dur||dur<5){showToast('Durasi minimal 5 menit','error');return}
  var token=genTK(4), now=new Date(), rombels=getGuruRombel();
  var db=getDB(kelasDipilih);
  if(!db){showToast('DB error','error');return}
  db.collection('tokens').add({token:token,mapel:mapel,kelas:kelasDipilih,rombel:rombels,npsn:getGuruNPSN(),sekolah:gData.sekolah,guruNip:gData.nip,guruNama:gData.nama,startTime:firebase.firestore.Timestamp.fromDate(now),endTime:firebase.firestore.Timestamp.fromDate(new Date(now.getTime()+dur*60000)),durationMinutes:dur,isActive:true,createdAt:firebase.firestore.FieldValue.serverTimestamp()}).then(function(){showToast('Token: '+token+' berhasil dibuat untuk '+kelasDipilih+'!');closeModal();reloadToken()}).catch(function(e){showToast('Gagal: '+e.message,'error')});
}
function delToken(id,kelas){if(!confirm('Hapus token?'))return;getDB(kelas||activeClass).collection('tokens').doc(id).delete().then(function(){showToast('Dihapus');reloadToken()}).catch(function(){showToast('Gagal','error')});}

/* === KARTU UJIAN === */
function rKartuUjian(c){
  var h='<div class="fade-in no-print space-y-4"><div class="card"><h3 class="font-bold text-light mb-4">Kartu Ujian SAT 2026 &mdash; <span class="text-kopAccent">'+activeClass+'</span></h3><div class="grid md:grid-cols-3 gap-4 mb-4"><div><label class="text-xs text-muted block mb-1">Kelas</label><select id="kuK" class="input-field" onchange="switchDB(this.value); loadKartuUjian()"><option value="">Semua</option>';getGuruKelas().forEach(function(k){h+='<option value="'+k+'"'+(k===activeClass?' selected':'')+'>'+k+'</option>'});h+='</select></div><div><label class="text-xs text-muted block mb-1">Rombel</label><select id="kuR" class="input-field" onchange="loadKartuUjian()"><option value="">Semua</option>';getGuruRombel().forEach(function(r){h+='<option value="'+r+'">Rombel '+r+'</option>'});h+='</select></div><div class="flex items-end gap-2"><button onclick="loadKartuUjian()" class="btn-primary text-sm flex-1"><i class="fas fa-id-card mr-2"></i>Tampilkan</button><button onclick="doCetakKartuUjian()" class="btn-secondary text-sm"><i class="fas fa-print mr-2"></i>Cetak</button></div></div></div><div id="kuBox"></div></div>';
  c.innerHTML=h;
}
function loadKartuUjian(){
  var kelas=document.getElementById('kuK').value||activeClass, rombel=document.getElementById('kuR').value;
  var box=document.getElementById('kuBox');
  box.innerHTML='<p class="text-muted text-center py-4"><i class="fas fa-spinner fa-spin mr-2"></i>Memuat...</p>';
  fetchSiswaRombel(kelas,rombel).then(function(siswa){
    if(!siswa.length){box.innerHTML='<div class="card text-center py-8"><p class="text-muted">Tidak ada siswa.</p></div>';return}
    var h='<div class="print-preview-wrap">';
    for(var page=0;page<Math.ceil(siswa.length/12);page++){
      var startIdx=page*12, endIdx=Math.min(startIdx+12,siswa.length), pageSiswa=siswa.slice(startIdx,endIdx);
      h+='<div class="kartu-page"><div class="kartu-grid">';
      pageSiswa.forEach(function(s){
        h+='<div class="kartu-item"><div class="kartu-header"><h3>Kartu Ujian SAT 2026</h3><h4>'+gData.sekolah.toUpperCase()+'</h4></div><div class="kartu-body"><table class="kartu-table"><tr><td class="lbl">NPSN</td><td class="val">: '+gData.npsn+'</td></tr><tr><td class="lbl">Nama</td><td class="val">: '+s.nama+'</td></tr><tr><td class="lbl">NISN</td><td class="val">: '+s.nisn+'</td></tr><tr><td class="lbl">Kelas</td><td class="val">: '+s.kelas+' / '+s.rombel+'</td></tr></table></div><div class="kartu-footer"><b>Login:</b> SAT-'+s.nisn+'</div></div>';
      });
      var emptySlots=12-pageSiswa.length;
      for(var e=0;e<emptySlots;e++){h+='<div class="kartu-item kartu-kosong" style="opacity:0;pointer-events:none;"></div>'}
      h+='</div></div>';
    }
    h+='</div>';box.innerHTML=h;
  });
}
function doCetakKartuUjian(){
  var pages=document.querySelectorAll('#kuBox .kartu-page');
  if(!pages.length){showToast('Tampilkan kartu dulu','warning');return}
  var content='';
  pages.forEach(function(p){content+=p.outerHTML});
  printFrame(content);
}

/* === LEMBAR JAWABAN === */
function rLembarJawaban(c){
  var h='<div class="fade-in no-print space-y-4"><div class="card"><h3 class="font-bold text-light mb-4">Cetak Lembar Jawaban &mdash; <span class="text-kopAccent">'+activeClass+'</span></h3><div class="grid md:grid-cols-4 gap-4 mb-4"><div><label class="text-xs text-muted block mb-1">Mapel</label><select id="ljM" class="input-field"><option value="">-- Pilih --</option>';MAPEL_LIST.forEach(function(m){h+='<option value="'+m.id+'">'+m.nama+'</option>'});h+='</select></div><div><label class="text-xs text-muted block mb-1">Kelas</label><select id="ljK" class="input-field" onchange="switchDB(this.value)"><option value="">Semua</option>';getGuruKelas().forEach(function(k){h+='<option value="'+k+'"'+(k===activeClass?' selected':'')+'>'+k+'</option>'});h+='</select></div><div><label class="text-xs text-muted block mb-1">Rombel</label><select id="ljR" class="input-field"><option value="">Semua</option>';getGuruRombel().forEach(function(r){h+='<option value="'+r+'">Rombel '+r+'</option>'});h+='</select></div><div class="flex items-end gap-2"><button onclick="loadLembarJawaban()" class="btn-primary text-sm flex-1"><i class="fas fa-file-invoice mr-2"></i>Generate</button><button onclick="doCetakLembarJawaban()" class="btn-secondary text-sm"><i class="fas fa-print mr-2"></i>Cetak</button></div></div><div class="p-3 rounded-lg bg-warning/10 border border-warning/30 text-xs text-warning"><i class="fas fa-exclamation-triangle mr-1"></i>Opsi otomatis menyesuaikan (A-C untuk Kelas 1/2, A-D untuk lainnya).</div></div><div id="ljBox"></div></div>';
  c.innerHTML=h;
}
function loadLembarJawaban(){
  var mapel=document.getElementById('ljM').value, kelas=document.getElementById('ljK').value||activeClass, rombel=document.getElementById('ljR').value;
  if(!mapel){showToast('Pilih Mapel','warning');return}
  var box=document.getElementById('ljBox');
  box.innerHTML='<p class="text-muted text-center py-4"><i class="fas fa-spinner fa-spin mr-2"></i>Memuat...</p>';
  Promise.all([fetchSoal(mapel,kelas),fetchSiswaRombel(kelas,rombel)]).then(function(results){
    var docs=results[0], siswa=results[1];
    if(!siswa.length){box.innerHTML='<div class="card text-center py-8"><p class="text-muted">Tidak ada siswa.</p></div>';return}
    if(!docs.length){box.innerHTML='<div class="card text-center py-8"><p class="text-muted">Tidak ada soal.</p></div>';return}
    var pg=[], ur=[]; docs.forEach(function(q){if(q.type==='pg')pg.push(q);else ur.push(q)});
    var mn=(MAPEL_LIST.find(function(m){return m.id===mapel})||{}).nama||mapel;
    var h='<div class="print-preview-wrap">';
    siswa.forEach(function(s){
      var isLowGrade=(s.kelas==='Kelas 1'||s.kelas==='Kelas 2'||s.kelas==='Kelas 3');
      var optionList=(s.kelas==='Kelas 1'||s.kelas==='Kelas 2')?['A','B','C']:['A','B','C','D'];
      var optHtml=optionList.map(function(o){return'<div class="lembar-opt">'+o+'</div>'}).join('');
      var gridStyle='grid-template-columns: repeat('+optionList.length+', 1fr);';
      var namaVal=isLowGrade?'':s.nama, nisnVal=isLowGrade?'':s.nisn;
      h+='<div class="lembar-jawaban"><div class="lembar-header"><h2>Lembar Jawaban Ujian</h2><p style="text-align:center;font-weight:bold">SAT 2026 - '+mn+'</p></div><div class="lembar-bio"><label>Nama</label><span>: '+namaVal+'</span><label>NISN</label><span>: '+nisnVal+'</span><label>Kelas</label><span>: '+s.kelas+'</span><label>Rombel</label><span>: '+s.rombel+'</span></div>';
      if(pg.length){
        h+='<div class="lembar-section-title">I. Pilihan Ganda</div><div class="lembar-grid">';
        pg.forEach(function(q,i){
          h+='<div class="lembar-box"><div class="font-bold mb-1">'+(i+1)+'.</div><div class="lembar-box-inner" style="'+gridStyle+'">'+optHtml+'</div></div>';
        });
        h+='</div>';
      }
      if(ur.length){
        h+='<div class="lembar-section-title">II. Uraian</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px 15px">';
        ur.forEach(function(q,i){
          h+='<div style="margin-bottom:5px"><div class="font-bold">'+(pg.length+i+1)+'.</div><div style="border:1px solid #000;height:80px;margin-top:3px;padding:3px"></div></div>';
        });
        h+='</div>';
      }
      h+='</div>';
    });
    h+='</div>';box.innerHTML=h;
  }).catch(function(e){box.innerHTML='<p class="text-danger p-4">'+e.message+'</p>'});
}
function doCetakLembarJawaban(){
  var mapel=document.getElementById('ljM').value, kelas=document.getElementById('ljK').value||activeClass, rombel=document.getElementById('ljR').value;
  if(!mapel){showToast('Pilih Mapel terlebih dahulu','warning');return}
  showToast('Menyiapkan dokumen cetak...','warning');
  Promise.all([fetchSoal(mapel,kelas),fetchSiswaRombel(kelas,rombel)]).then(function(results){
    var docs=results[0], siswa=results[1];
    if(!siswa.length||!docs.length){showToast('Data siswa atau soal kosong','error');return}
    var pg=[], ur=[]; docs.forEach(function(q){if(q.type==='pg')pg.push(q);else ur.push(q)});
    var mn=(MAPEL_LIST.find(function(m){return m.id===mapel})||{}).nama||mapel;
    var bodyHtml='';
    siswa.forEach(function(s){
      var isLowGrade=(s.kelas==='Kelas 1'||s.kelas==='Kelas 2'||s.kelas==='Kelas 3');
      var optionList=(s.kelas==='Kelas 1'||s.kelas==='Kelas 2')?['A','B','C']:['A','B','C','D'];
      var optHtml=optionList.map(function(o){return'<div class="lembar-opt">'+o+'</div>'}).join('');
      var gridStyle='grid-template-columns: repeat('+optionList.length+', 1fr);';
      var namaVal=isLowGrade?'':s.nama, nisnVal=isLowGrade?'':s.nisn;
      bodyHtml+='<div class="lembar-jawaban"><div class="lembar-header"><h2>Lembar Jawaban Ujian</h2><p style="text-align:center;font-weight:bold">SAT 2026 - '+mn+'</p></div><div class="lembar-bio"><label>Nama</label><span>: '+namaVal+'</span><label>NISN</label><span>: '+nisnVal+'</span><label>Kelas</label><span>: '+s.kelas+'</span><label>Rombel</label><span>: '+s.rombel+'</span></div>';
      if(pg.length){
        bodyHtml+='<div class="lembar-section-title">I. Pilihan Ganda</div><div class="lembar-grid">';
        pg.forEach(function(q,i){
          bodyHtml+='<div class="lembar-box"><div class="font-bold mb-1">'+(i+1)+'.</div><div class="lembar-box-inner" style="'+gridStyle+'">'+optHtml+'</div></div>';
        });
        bodyHtml+='</div>';
      }
      if(ur.length){
        bodyHtml+='<div class="lembar-section-title">II. Uraian</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px 15px">';
        ur.forEach(function(q,i){
          bodyHtml+='<div style="margin-bottom:5px"><div class="font-bold">'+(pg.length+i+1)+'.</div><div style="border:1px solid #000;height:80px;margin-top:3px;padding:3px"></div></div>';
        });
        bodyHtml+='</div>';
      }
      bodyHtml+='</div>';
    });
    var fullHtml='<!DOCTYPE html><html><head><title>Cetak Lembar Jawaban</title><style>@page{size:A4 portrait;margin:1.5cm}body{margin:0;padding:0;font-family:"Times New Roman",serif;font-size:11pt;line-height:1.5;color:#000;-webkit-print-color-adjust:exact;print-color-adjust:exact}.lembar-jawaban{width:100%;min-height:290mm;background:white;color:black;font-family:"Times New Roman",serif;font-size:11pt;padding:0;margin:0 auto;page-break-after:always;position:relative;box-sizing:border-box}.lembar-jawaban:last-child{page-break-after:auto}.lembar-header{border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:20px}.lembar-header h2{text-align:center;text-transform:uppercase;font-size:14pt;margin:0 0 10px}.lembar-bio{display:grid;grid-template-columns:auto 1fr auto 1fr;gap:5px 20px;font-size:11pt}.lembar-bio label{font-weight:bold}.lembar-bio span{border-bottom:1px dotted #000;display:inline-block;width:100%}.lembar-section-title{background:#eee!important;font-weight:bold;padding:5px 10px;margin:20px 0 10px;border-left:5px solid #000;text-transform:uppercase;font-size:12pt}.lembar-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.lembar-box{border:1px solid #000;padding:4px;text-align:center;font-size:10pt}.lembar-box-inner{display:grid;gap:2px}.lembar-opt{border:1px solid #ccc;height:20px;line-height:20px;font-size:10pt}</style></head><body>'+bodyHtml+'</body></html>';
    printCustomFrame(fullHtml);
  }).catch(function(e){showToast('Gagal mencetak: '+e.message,'error')});
}
</script>
</body>
</html>
